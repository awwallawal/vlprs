name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/vlprs-server
  CLIENT_IMAGE: ghcr.io/${{ github.repository_owner }}/vlprs-client

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: vlprs_test
          POSTGRES_PASSWORD: vlprs_test
          POSTGRES_DB: vlprs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vlprs_test -d vlprs_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://vlprs_test:vlprs_test@localhost:5432/vlprs_test
      JWT_SECRET: ci-test-secret-not-for-production
      CSRF_SECRET: ci-test-csrf-secret-min-32-characters-long
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter shared build

      - name: Apply database schema
        run: pnpm --filter server db:migrate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (unit + integration)
        run: pnpm test && pnpm --filter server test:integration

  deploy:
    name: Build, Push & Deploy
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          target: production
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:${{ github.sha }}
            ${{ env.SERVER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.client
          target: production
          push: true
          tags: |
            ${{ env.CLIENT_IMAGE }}:${{ github.sha }}
            ${{ env.CLIENT_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=https://oyocarloan.com.ng/api
            BUILD_SHA=${{ github.sha }}

      # Droplet/DO prerequisites (see docs/deployment.md):
      #  - DO cloud firewall inbound must allow TCP 22, 80, 443 from all sources.
      #    A restrictive firewall silently black-holes 80/443 (SSH still works) — the
      #    2026-07-05 outage. NOT visible to ufw/iptables on the box; it's at DO's edge.
      #  - a valid ghcr pull credential. Belt-and-suspenders (2026-07-09):
      #      1. GHCR_PAT repo secret (a no-expiry PAT with read:packages) — durable,
      #         and the same credential works for manual `docker login` on the droplet.
      #      2. if GHCR_PAT is ever unset/empty, fall back to this run's ephemeral
      #         GITHUB_TOKEN (packages:read via the job permissions) — so CI auth can
      #         NEVER silently expire, secret or no secret.
      #    Either way the login runs every deploy and, under `set -eu`, a failed login
      #    aborts loudly (the 2026-07-05 deploy no-op'd silently on an expired cred).
      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: GHCR_PAT,GHCR_USER,GHCR_TOKEN,GHCR_ACTOR
          script: |
            set -eu
            cd /opt/vlprs
            # Refresh registry auth every deploy: prefer the durable GHCR_PAT,
            # else the run's ephemeral GITHUB_TOKEN. Never silently no-ops.
            if [ -n "${GHCR_PAT:-}" ]; then
              echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            else
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            fi
            git pull origin main
            export IMAGE_TAG=${{ github.sha }}
            docker compose -f compose.prod.yaml pull
            docker compose -f compose.prod.yaml up -d --force-recreate --remove-orphans
            docker image prune -f

      - name: Verify deployment
        run: |
          echo "Verifying deployed version matches ${{ github.sha }}..."
          for i in $(seq 1 12); do
            # --connect-timeout/--max-time cap each attempt: an unreachable site now
            # fails this loop in minutes, not the 30-min connect-hang of 2026-07-05.
            DEPLOYED=$(curl -sf --connect-timeout 10 --max-time 15 https://oyocarloan.com.ng/api/health | jq -r '.version' || true)
            if [ "$DEPLOYED" = "${{ github.sha }}" ]; then
              echo "Deployment verified: $DEPLOYED"
              exit 0
            fi
            if [ -z "$DEPLOYED" ]; then
              echo "Health endpoint unreachable (attempt $i/12) — retrying in 15s..."
            else
              echo "Expected ${{ github.sha }}, got $DEPLOYED (attempt $i/12) — retrying in 15s..."
            fi
            sleep 15
          done
          echo "DEPLOYMENT VERIFICATION FAILED — site unreachable, or serving a different version (deploy may have silently no-op'd)"
          exit 1
