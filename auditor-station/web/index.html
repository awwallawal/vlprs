<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Auditor Station</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header>
      <h1>Auditor Station</h1>
      <div id="banner" class="banner" role="status">Loading snapshot…</div>
    </header>

    <main id="log" aria-live="polite"></main>

    <form id="form" autocomplete="off">
      <div id="pin-row" class="pin-row hidden">
        <label for="pin">Access PIN</label>
        <input id="pin" type="password" inputmode="numeric" placeholder="PIN" />
      </div>
      <div class="ask-row">
        <textarea id="q" rows="2" placeholder="Ask about a beneficiary, an MDA, a loan computation, or the records…"></textarea>
        <button id="send" type="submit">Ask</button>
      </div>
      <p class="hint">
        Examples: “Trace BADMUS across all MDAs” · “Summary of BIR” ·
        “Verify the interest for ₦750,000 over 36 months” · “Staff with balance below zero”
      </p>
    </form>

    <script src="/app.js" type="module"></script>
  </body>
</html>
